<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パーソナリティ ラベル</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app-container">
        <div id="start-container">
            <div id="lang-btn-container">
                <button id="lang-btn-ja" class="lang-btn active">日本語</button>
                <button id="lang-btn-en" class="lang-btn">English</button>
            </div>
            <h1 id="ui-title">Label Me!</h1>
            <p id="ui-description">いくつかの質問に答えて、<br>あなただけのオリジナルラベルを生成します。</p>
            
            <input type="text" id="nickname-input" placeholder="ニックネームを入力">
            <button id="start-btn" id="ui-start-btn">はじめる</button>
        </div>

        <div id="quiz-container" class="hidden">
            <h2 id="question-text"></h2>
            <div id="button-container">
                <button id="no-btn">いいえ</button>
                <button id="yes-btn">はい</button>
            </div>
        </div>

        <div id="loading-container" class="hidden">
            <div class="spinner"></div>
            <p id="ui-loading-text">あなたのラベルを生成中...</p>
        </div>

        <div id="result-container" class="hidden">
            <p id="ui-print-wait-text"></p>
            <img id="result-image" src="" alt="生成されたラベル">
            <button id="restart-btn" id="ui-restart-btn">もう一度試す</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
